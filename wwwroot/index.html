<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="contenedor">
    <h1>📋 Mis Tareas</h1>

        id="buscar"

    <div id="lista"></div>
</div>

    <script src="/js/app.js"></script>
</body>
</html>
