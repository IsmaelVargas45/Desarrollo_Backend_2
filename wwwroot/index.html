<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="contenedor">
    <h1>📋 Mis Tareas</h1>

    <div class="toolbar">
        <input
            type="text"
            id="buscar"
            placeholder="Buscar tarea..."
            onkeyup="cargarTareas()">
        <button onclick="openModalToCreate()">Agregar tarea</button>
    </div>

    <div id="lista"></div>
  </div>

  <div id="modal" class="modal-overlay hidden" onclick="cerrarModalAlClickFuera(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2 id="modal-title">Nueva tarea</h2>
      <form id="modal-form" onsubmit="guardarTarea(event)">
        <input type="text" id="modal-titulo" placeholder="Título">
        <textarea id="modal-descripcion" placeholder="Descripción" rows="4"></textarea>
        <div class="modal-actions">
          <button type="button" class="secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
