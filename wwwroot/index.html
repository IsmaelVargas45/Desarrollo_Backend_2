<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Login / Register -->
        <div id="auth-section">
            <h1>Task Manager</h1>
            <div id="login-form">
                <h2>Iniciar Sesión</h2>
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Contraseña">
                <button onclick="login()">Ingresar</button>
                <p>¿No tienes cuenta? <a href="#" onclick="showRegister()">Regístrate</a></p>
            </div>
            <div id="register-form" style="display:none;">
                <h2>Registro</h2>
                <input type="text" id="register-nombre" placeholder="Nombre completo">
                <input type="email" id="register-email" placeholder="Email">
                <input type="password" id="register-password" placeholder="Contraseña">
                <button onclick="register()">Registrarse</button>
                <p>¿Ya tienes cuenta? <a href="#" onclick="showLogin()">Inicia sesión</a></p>
            </div>
        </div>

        <!-- Panel de Tareas (oculto hasta login) -->
        <div id="tasks-section" style="display:none;">
            <div id="user-info">
                <span id="user-name"></span> (<span id="user-role"></span>)
                <button onclick="logout()">Cerrar sesión</button>
            </div>

            <div id="tasks-toolbar">
                <h2>Mis Tareas</h2>
                <div id="tasks-toolbar-actions">
                    <input type="text" id="buscar-tarea" placeholder="Buscar por título..." oninput="filtrarTareas()">
                    <button id="btn-nueva-tarea" onclick="abrirModalTarea()" style="display:none;">Crear tarea</button>
                </div>
            </div>

            <div id="lista-tareas"></div>
        </div>

        <!-- Modal: Crear nueva tarea (solo Admin) -->
        <div id="admin-panel-overlay" style="display:none;" onclick="cerrarModalTareaSiFondo(event)">
            <div id="admin-panel">
                <button id="admin-panel-close" onclick="cerrarModalTarea()" aria-label="Cerrar">&times;</button>
                <h3>Crear nueva tarea</h3>
                <input type="text" id="new-titulo" placeholder="Título">
                <input type="text" id="new-descripcion" placeholder="Descripción">
                <select id="new-usuario"></select>
                <button onclick="crearTarea()">Crear</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
